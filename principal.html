<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<!-- 🔥 ARREGLADO VIEWPORT -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bautismo Bastian</title>

<style>
@font-face {
    font-family: 'SuperStarfish';
    src: url('SuperStarfish.ttf');
}

* {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

/* BODY */
body {
    margin: 0;
    font-family: 'SuperStarfish';
    color: white;
    background: url("fondo2.jpeg") no-repeat center center;
    background-size: cover;
    overflow-x: hidden;
}

/* PORTADA */
.portada { height: 100svh; }
.portada img { width: 100%; height: 100%; object-fit: cover; }

/* CONTENIDO */
.contenido {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 24px 12px 120px;
}

/* DECORACIÓN */
.decoracion-lateral {
    display: flex;
    flex-direction: column;
    gap: 15px;
}
.decoracion-lateral img {
    width: 150px;
    border-radius: 40px;
}

/* CAJA */
.caja {
    max-width: 700px;
    width: 100%;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    padding: 24px 18px;
    border-radius: 20px;
    text-align: center;
}

/* TEXTO */
.verso {
    font-size: 18px;
    line-height: 1.5;
}

/* GALERÍA */
.galeria { overflow: hidden; width: 100%; }
.slider { display: flex; transition: transform 0.5s ease; }

.foto {
    min-width: 100%;
    display: flex;
    justify-content: center;
}

.foto-inner img {
    width: min(240px, 70vw);
    height: auto;
    object-fit: cover;
}

/* ❌ ESTO TE ROMPÍA TODO */
.img-encima {
    display: none;
}

/* BOTONES */
.botones {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.boton {
    padding: 14px;
    font-size: 16px;
    min-height: 50px;
    border-radius: 12px;
    background: #ffcc00;
    border: none;
}

/* TIMELINE */
.timeline::after {
    left: 50%;
}

.evento-icono {
    width: 36px;
    height: 36px;
}

/* =========================
   📱 MOBILE PRO
========================= */
@media(max-width:700px){

    .decoracion-lateral {
        display: none;
    }

    .contenido {
        padding: 16px 10px 130px;
    }

    .caja {
        padding: 18px 12px;
    }

    .verso {
        font-size: 15px;
    }

    /* timeline vertical */
    .timeline::after {
        left: 20px;
    }

    .evento-icono {
        left: 20px !important;
    }

    .contenido-item {
        margin-left: 50px !important;
        text-align: left !important;
        white-space: normal;
        max-width: 85%;
    }

    /* reproductor ancho completo */
    #player {
        width: calc(100vw - 16px);
        left: 8px;
        bottom: 8px;
    }

    /* imágenes mejor escala */
    .foto-inner img {
        width: 90%;
        height: auto;
    }
}
</style>
</head>

<body>

<div class="portada">
    <img src="portada.jpeg">
</div>

<div class="contenido">

<div class="decoracion-lateral">
    <img src="dec1.png">
    <img src="dec2.png">
</div>

<div class="caja">

<p class="verso">
"El te cubrirá con sus plumas..."<br>
<strong>SALMO 91:4</strong>
</p>

<h2>Te invito a mi Bautismo</h2>

<div class="botones">
<button class="boton">Fecha</button>
<button class="boton">Ubicación</button>
<button class="boton">Confirmar</button>
<button class="boton">Regalos</button>
</div>

</div>

</div>

</body>
</html>
